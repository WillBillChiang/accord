AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Accord TEE Negotiation Engine - Data Infrastructure.
  DynamoDB tables (Sessions, AuditLog, Users) with KMS encryption and PITR.
  S3 buckets for audit logs (Glacier lifecycle, 7-year retention) and documents.
  SOC 2 Type II / ISO 27001 compliant.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment name.

  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PAY_PER_REQUEST
      - PROVISIONED
    Description: DynamoDB billing mode. Use PAY_PER_REQUEST for on-demand scaling.

Resources:
  # ============================================================
  # DynamoDB: Sessions Table
  # ============================================================
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${EnvironmentName}-accord-sessions"
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: createdBy
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: createdBy-createdAt-index
          KeySchema:
            - AttributeName: createdBy
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::ImportValue: !Sub "${EnvironmentName}-accord-KMSKeyArn"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: accord

  # ============================================================
  # DynamoDB: AuditLog Table (retained indefinitely for compliance)
  # ============================================================
  AuditLogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${EnvironmentName}-accord-audit-log"
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: "N"
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::ImportValue: !Sub "${EnvironmentName}-accord-KMSKeyArn"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # No TTL - audit logs retained indefinitely for SOC 2 / ISO 27001
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: accord
        - Key: DataClassification
          Value: confidential
        - Key: RetentionPolicy
          Value: indefinite

  # ============================================================
  # DynamoDB: Users Table
  # ============================================================
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${EnvironmentName}-accord-users"
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Fn::ImportValue: !Sub "${EnvironmentName}-accord-KMSKeyArn"
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: accord
        - Key: DataClassification
          Value: pii

  # ============================================================
  # S3: Audit Logs Bucket
  # ============================================================
  AuditLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${EnvironmentName}-accord-audit-logs-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub "${EnvironmentName}-accord-KMSKeyArn"
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ObjectLockEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacierAndRetain
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90
            ExpirationInDays: 2555  # 7 years (365 * 7)
      LoggingConfiguration:
        LogFilePrefix: access-logs/
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: accord
        - Key: DataClassification
          Value: confidential
        - Key: RetentionPolicy
          Value: 7-years

  AuditLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Deny unencrypted uploads
          - Sid: DenyUnencryptedUploads
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub "${AuditLogsBucket.Arn}/*"
            Condition:
              StringNotEquals:
                "s3:x-amz-server-side-encryption": "aws:kms"
          # Deny non-HTTPS requests
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt AuditLogsBucket.Arn
              - !Sub "${AuditLogsBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
          # Allow CloudTrail to write logs
          - Sid: AllowCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${AuditLogsBucket.Arn}/cloudtrail/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"
                "aws:SourceAccount": !Ref AWS::AccountId
          - Sid: AllowCloudTrailACLCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditLogsBucket.Arn
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId

  # ============================================================
  # S3: Documents Bucket
  # ============================================================
  DocumentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${EnvironmentName}-accord-documents-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub "${EnvironmentName}-accord-KMSKeyArn"
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: accord
        - Key: DataClassification
          Value: confidential

  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub "${DocumentsBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

Outputs:
  SessionsTableName:
    Description: DynamoDB Sessions table name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub "${EnvironmentName}-accord-SessionsTableName"

  SessionsTableArn:
    Description: DynamoDB Sessions table ARN
    Value: !GetAtt SessionsTable.Arn
    Export:
      Name: !Sub "${EnvironmentName}-accord-SessionsTableArn"

  AuditLogTableName:
    Description: DynamoDB AuditLog table name
    Value: !Ref AuditLogTable
    Export:
      Name: !Sub "${EnvironmentName}-accord-AuditLogTableName"

  AuditLogTableArn:
    Description: DynamoDB AuditLog table ARN
    Value: !GetAtt AuditLogTable.Arn
    Export:
      Name: !Sub "${EnvironmentName}-accord-AuditLogTableArn"

  UsersTableName:
    Description: DynamoDB Users table name
    Value: !Ref UsersTable
    Export:
      Name: !Sub "${EnvironmentName}-accord-UsersTableName"

  UsersTableArn:
    Description: DynamoDB Users table ARN
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub "${EnvironmentName}-accord-UsersTableArn"

  AuditLogsBucketName:
    Description: S3 Audit Logs bucket name
    Value: !Ref AuditLogsBucket
    Export:
      Name: !Sub "${EnvironmentName}-accord-AuditLogsBucketName"

  AuditLogsBucketArn:
    Description: S3 Audit Logs bucket ARN
    Value: !GetAtt AuditLogsBucket.Arn
    Export:
      Name: !Sub "${EnvironmentName}-accord-AuditLogsBucketArn"

  DocumentsBucketName:
    Description: S3 Documents bucket name
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub "${EnvironmentName}-accord-DocumentsBucketName"

  DocumentsBucketArn:
    Description: S3 Documents bucket ARN
    Value: !GetAtt DocumentsBucket.Arn
    Export:
      Name: !Sub "${EnvironmentName}-accord-DocumentsBucketArn"
